name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest
    steps:
      - name: Check out tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate release tag
        id: tag
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Refusing non-stable SemVer tag: $TAG"
            exit 1
          fi

          git fetch --no-tags origin "+refs/heads/main:refs/remotes/origin/main"
          tag_commit="$(git rev-parse "${TAG}^{commit}")"
          if ! git merge-base --is-ancestor "$tag_commit" refs/remotes/origin/main; then
            echo "Refusing to release $TAG because $tag_commit is not an ancestor of main."
            exit 1
          fi
          echo "commit=$tag_commit" >> "$GITHUB_OUTPUT"

      - name: Test tagged source
        run: make check

      - name: Build release archives
        id: build
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
          COMMIT: ${{ steps.tag.outputs.commit }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ldflags="-s -w -X github.com/T-Zevin/SkillGuardrail/internal/version.Version=${version} -X github.com/T-Zevin/SkillGuardrail/internal/version.Commit=${COMMIT} -X github.com/T-Zevin/SkillGuardrail/internal/version.Date=${build_date}"

          mkdir -p dist staging
          targets=(
            "darwin amd64"
            "darwin arm64"
            "linux amd64"
            "linux arm64"
            "windows amd64"
            "windows arm64"
          )

          for target in "${targets[@]}"; do
            read -r goos goarch <<< "$target"
            archive="SkillGuardrail_${version}_${goos}_${goarch}"
            package_dir="staging/${archive}"
            mkdir -p "$package_dir"

            binary="skillguardrail"
            if [[ "$goos" == "windows" ]]; then
              binary="skillguardrail.exe"
            fi

            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" \
              go build -trimpath -ldflags "$ldflags" \
              -o "${package_dir}/${binary}" ./cmd/skillguardrail
            cp LICENSE README.md README.zh-CN.md "$package_dir/"

            if [[ "$goos" == "windows" ]]; then
              (cd staging && zip -q -r "../dist/${archive}.zip" "$archive")
            else
              tar -C staging -czf "dist/${archive}.tar.gz" "$archive"
            fi
            rm -rf "$package_dir"
          done

          (
            cd dist
            sha256sum SkillGuardrail_*.tar.gz SkillGuardrail_*.zip | sort -k2 > checksums.txt
          )

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Generate Homebrew formula
        shell: bash
        env:
          VERSION: ${{ steps.build.outputs.version }}
        run: |
          set -euo pipefail
          sha() { sha256sum "$1" | awk '{print $1}'; }

          darwin_amd64="$(sha "dist/SkillGuardrail_${VERSION}_darwin_amd64.tar.gz")"
          darwin_arm64="$(sha "dist/SkillGuardrail_${VERSION}_darwin_arm64.tar.gz")"
          linux_amd64="$(sha "dist/SkillGuardrail_${VERSION}_linux_amd64.tar.gz")"
          linux_arm64="$(sha "dist/SkillGuardrail_${VERSION}_linux_arm64.tar.gz")"

          sed \
            -e "s/@VERSION@/${VERSION}/g" \
            -e "s/@DARWIN_AMD64_SHA256@/${darwin_amd64}/g" \
            -e "s/@DARWIN_ARM64_SHA256@/${darwin_arm64}/g" \
            -e "s/@LINUX_AMD64_SHA256@/${linux_amd64}/g" \
            -e "s/@LINUX_ARM64_SHA256@/${linux_arm64}/g" \
            packaging/homebrew/skillguardrail.rb.tmpl > dist/skillguardrail.rb

      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            is_draft="$(gh release view "$TAG" --json isDraft --jq .isDraft)"
            if [[ "$is_draft" == "true" ]]; then
              gh release upload "$TAG" dist/* --clobber
              gh release edit "$TAG" --draft=false
            else
              echo "Release $TAG is already published; leaving its assets unchanged."
              gh release download "$TAG" \
                --pattern skillguardrail.rb \
                --dir dist \
                --clobber
            fi
          else
            gh release create "$TAG" dist/* \
              --draft \
              --verify-tag \
              --title "SkillGuardrail ${TAG}" \
              --generate-notes
            gh release edit "$TAG" --draft=false
          fi

      - name: Update Homebrew tap when configured
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "::notice::HOMEBREW_TAP_GITHUB_TOKEN is not configured; skillguardrail.rb remains attached to the release."
            exit 0
          fi

          endpoint="repos/T-Zevin/homebrew-tap/contents/Formula/skillguardrail.rb"
          content="$(base64 -w 0 dist/skillguardrail.rb)"
          existing_sha="$(gh api "$endpoint" --jq .sha 2>/dev/null || true)"

          args=(
            --method PUT
            -f "message=Update SkillGuardrail to ${TAG}"
            -f "content=${content}"
            -f "branch=main"
          )
          if [[ -n "$existing_sha" ]]; then
            args+=(-f "sha=${existing_sha}")
          fi
          gh api "$endpoint" "${args[@]}"
